name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 */6 * * *'   # toutes les 6h
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping CerfaDon
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "CerfaDon: %{http_code}\n" \
            "https://fxkussqoufndsvgnsqao.supabase.co/rest/v1/cafes?select=id&limit=1" \
            -H "apikey: ${{ secrets.CERFA_DONS }}"

      - name: Ping DaddyBaux
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "DaddyBaux: %{http_code}\n" \
            "https://cafkamkmwupkehvbcm.supabase.co/rest/v1/baux?select=id&limit=1" \
            -H "apikey: ${{ secrets.DADDY_BAUX }}"

      - name: Ping DaddyChantier
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "DaddyChantier: %{http_code}\n" \
            "https://fokjnreiytpqucwbyxub.supabase.co/rest/v1/app_users?select=id&limit=1" \
            -H "apikey: ${{ secrets.DADDY_CHANTIER }}"

      - name: Ping DaddyLodge
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "DaddyLodge: %{http_code}\n" \
            "https://ruxytkkxafkdubujtehq.supabase.co/rest/v1/dl_carte?select=id&limit=1" \
            -H "apikey: ${{ secrets.DADDY_LODGE }}"

      - name: Ping DaddyPay
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "DaddyPay: %{http_code}\n" \
            "https://hhxuumexyvoxomoarmul.supabase.co/rest/v1/daddy_data?select=id&limit=1" \
            -H "apikey: ${{ secrets.DADDY_PAY }}"

      - name: Ping DaddyCool
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "DaddyCool: %{http_code}\n" \
            "https://qdimghftvgqwxjizjhpf.supabase.co/rest/v1/app_users?select=id&limit=1" \
            -H "apikey: ${{ secrets.DADDY_COOL }}"

      - name: Ping DaddyMatch
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "DaddyMatch: %{http_code}\n" \
            "https://cwhzveqfnyextbjscsox.supabase.co/rest/v1/app_users?select=id&limit=1" \
            -H "apikey: ${{ secrets.DADDY_MATCH }}"
